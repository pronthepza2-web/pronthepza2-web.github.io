<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Realm V2 - อาณาจักรนิยายใหม่</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        /* ========================================= */
        /* 🎨 THEME & UI DESIGN */
        /* ========================================= */
        :root { 
            --main-bg: #07070a; --card-bg: #111116; --text: #dcdce6; 
            --accent: #e5b539; --accent-hover: #ffd700; 
            --danger: #ff4757; --success: #2ed573; --border: #232332;
            --glow: rgba(229, 181, 57, 0.4);
        }
        
        body { 
            font-family: 'Sarabun', sans-serif; background: var(--main-bg); 
            background-image: radial-gradient(circle at 50% 0%, #131320 0%, var(--main-bg) 80%);
            color: var(--text); margin: 0; padding: 0; line-height: 1.6; min-height: 100vh; overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; cursor: pointer; }
        * { box-sizing: border-box; }

        /* Navigation */
        .navbar { 
            background: rgba(10, 10, 15, 0.95); border-bottom: 2px solid var(--border); 
            padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .logo { font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 700; color: var(--accent); cursor: pointer; text-shadow: 0 0 10px var(--glow); }
        .nav-actions { display: flex; gap: 15px; align-items: center; }

        .btn { padding: 8px 18px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: 0.3s; }
        .btn-primary { background: linear-gradient(45deg, var(--accent), #f1c40f); color: #000; box-shadow: 0 0 10px var(--glow); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 20px var(--glow); }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }

        .user-profile { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); }

        /* Layout Views */
        .view-section { display: none; padding: 40px 5%; max-width: 1300px; margin: auto; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .home-grid { display: grid; grid-template-columns: 3fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .home-grid { grid-template-columns: 1fr; } }

        .section-title { font-size: 1.6rem; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-top: 0; }
        
        .novel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .novel-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .novel-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 25px var(--glow); }
        .cover { height: 260px; background: #222; display: flex; align-items: center; justify-content: center; color: #444; font-weight: bold; }
        .info { padding: 15px; }

        .sidebar-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .sidebar-item { padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; display: block; }
        .sidebar-item:hover { color: var(--accent); padding-left: 8px; }

        /* Writer Studio */
        .editor-container { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .editor-toolbar { background: #0a0a0f; border-bottom: 1px solid var(--border); padding: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        .writer-editor { width: 100%; min-height: 500px; background: #0a0a0f; color: #fff; padding: 30px; outline: none; overflow-y: auto; font-size: 1.15rem; }
        .writer-editor[placeholder]:empty:before { content: attr(placeholder); color: #555; }
        .toolbar-btn { background: #1a1a24; color: #aaa; border: 1px solid #333; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-weight: bold; }
        .toolbar-btn:hover { background: var(--accent); color: #000; }

        /* Reader */
        .reader-box { max-width: 850px; margin: 20px auto; background: var(--card-bg); padding: 60px; border-radius: 12px; border-top: 5px solid var(--accent); box-shadow: 0 15px 50px rgba(0,0,0,0.7); }
        
        .footer { background: #050508; border-top: 1px solid var(--border); padding: 60px 5%; margin-top: 80px; text-align: center; color: #555; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="switchView('home-view')">Fantasy Realm V2</div>
        <div class="nav-actions" id="auth-ui">
            <button class="btn btn-primary" onclick="loginWithGoogle()">🔑 ล็อกอิน Gmail จริง</button>
        </div>
    </nav>

    <div id="home-view" class="view-section active">
        <div id="reading-bar" style="display: none; background: #0a0a0f; border-left: 4px solid var(--accent); padding: 15px 25px; border-radius: 8px; margin-bottom: 30px; justify-content: space-between; align-items: center;">
            <div><span style="color: #666; font-size: 0.8rem;">กำลังอ่านค้างไว้:</span><br><strong id="reading-title" style="color: var(--accent);"></strong></div>
            <button class="btn btn-primary" onclick="resumeReading()">อ่านต่อ ▶</button>
        </div>

        <div class="home-grid">
            <div>
                <h2 class="section-title">✨ ตำนานบทใหม่ <span>(ข้อมูลจริง)</span></h2>
                <div class="novel-grid" id="novel-list">
                    <p style="color: #444; padding: 20px;">กำลังเปิดหอสมุด...</p>
                </div>
            </div>
            <div>
                <div class="sidebar-box">
                    <h3 style="color: var(--accent); margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px;">🏆 อันดับตำนาน</h3>
                    <div id="ranking-list"></div>
                </div>
                <div class="sidebar-box">
                    <h3 style="margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px;">⏱️ อัปเดตล่าสุด</h3>
                    <div id="updates-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="studio-view" class="view-section">
        <h2 style="color: var(--accent);">✍️ จารึกตำนานใหม่</h2>
        <input type="text" id="post-title" style="width: 100%; padding: 15px; background: #0a0a0f; border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 20px; font-size: 1.2rem; outline: none;" placeholder="ชื่อเรื่องนิยายของคุณ...">
        
        <div class="editor-container">
            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="formatDoc('bold')">B</button>
                <button class="toolbar-btn" onclick="formatDoc('italic')">I</button>
                <button class="toolbar-btn" onclick="formatDoc('underline')">U</button>
                <button class="toolbar-btn" onclick="insertImage()">🖼️ ภาพ</button>
                <button class="toolbar-btn" onclick="formatDoc('foreColor', '#e5b539')">🎨 สีทอง</button>
            </div>
            <div id="post-editor" class="writer-editor" contenteditable="true" placeholder="เริ่มร่ายเวทมนตร์ผ่านตัวอักษรที่นี่..."></div>
        </div>
        
        <button class="btn btn-primary" style="margin-top: 25px; padding: 12px 40px;" id="save-btn" onclick="publishNovel()">✨ เผยแพร่ลงฐานข้อมูล</button>
    </div>

    <div id="reader-view" class="view-section">
        <button class="btn btn-outline" onclick="switchView('home-view')">⬅ กลับหน้าหลัก</button>
        <div class="reader-box">
            <h1 id="view-title" style="color: var(--accent); text-align: center; font-family: 'Cinzel', serif; font-size: 2.5rem; margin-bottom: 10px;"></h1>
            <p id="view-author" style="text-align: center; color: #888; margin-bottom: 40px;"></p>
            <div id="view-content" style="font-size: 1.25rem; white-space: pre-wrap;"></div>
        </div>
    </div>

    <footer class="footer">
        &copy; 2026 Fantasy Realm V2 | อาณาจักรที่ยุติธรรมที่สุดสำหรับนักเขียน
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBxHbbY6BmA8j9jpA3CLeODnwSGT6iiA2s",
            authDomain: "fantasy-realm-v2.firebaseapp.com",
            projectId: "fantasy-realm-v2",
            storageBucket: "fantasy-realm-v2.firebasestorage.app",
            messagingSenderId: "276174811412",
            appId: "1:276174811412:web:276ae46a7180265bfb9201",
            measurementId: "G-PX74GQGT88"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        let userAccount = null;

        function loginWithGoogle() { auth.signInWithPopup(provider).catch(e => alert(e.message)); }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged((user) => {
            userAccount = user;
            const authUI = document.getElementById('auth-ui');
            if (user) {
                authUI.innerHTML = `
                    <div class="user-profile">
                        <img src="${user.photoURL}" class="user-avatar">
                        <span style="color:var(--accent); font-weight:bold;">${user.displayName}</span>
                        <button class="btn btn-outline" onclick="switchView('studio-view')">สตูดิโอ</button>
                        <button class="btn btn-outline" onclick="logout()" style="border:none; color:#666; font-size:0.8rem;">[ออก]</button>
                    </div>
                `;
            } else {
                authUI.innerHTML = `<button class="btn btn-primary" onclick="loginWithGoogle()">🔑 ล็อกอิน Gmail จริง</button>`;
                switchView('home-view');
            }
        });

        async function publishNovel() {
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-editor').innerHTML;
            const btn = document.getElementById('save-btn');
            if (!userAccount) return alert("กรุณาล็อกอินก่อน!");
            if (!title || content === "") return alert("กรุณากรอกข้อมูลให้ครบ!");
            btn.innerText = "กำลังจารึกข้อมูล...";
            btn.disabled = true;
            try {
                await db.collection("novels-v2").add({
                    title: title,
                    content: content,
                    author: userAccount.displayName,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("✨ สำเร็จ!");
                document.getElementById('post-title').value = "";
                document.getElementById('post-editor').innerHTML = "";
                switchView('home-view');
            } catch (e) { alert(e.message); } finally {
                btn.innerText = "✨ เผยแพร่ลงฐานข้อมูล";
                btn.disabled = false;
            }
        }

        db.collection("novels-v2").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const list = document.getElementById('novel-list');
            const ranking = document.getElementById('ranking-list');
            const updates = document.getElementById('updates-list');
            list.innerHTML = ""; ranking.innerHTML = ""; updates.innerHTML = "";
            if (snapshot.empty) {
                list.innerHTML = "<p style='color:#555;'>ยังไม่มีใครเขียนตำนาน...</p>";
                return;
            }
            let rank = 1;
            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = 'novel-card';
                card.onclick = () => openReader(data.title, data.content, data.author);
                card.innerHTML = `<div class="cover">📖 READ</div><div class="info"><h4>${data.title}</h4><small>โดย ${data.author}</small></div>`;
                list.appendChild(card);

                const item = document.createElement('div');
                item.className = 'sidebar-item';
                item.onclick = () => openReader(data.title, data.content, data.author);
                item.innerHTML = `📜 ${data.title} <br><small style="color:#555;">โดย ${data.author}</small>`;
                updates.appendChild(item);

                if(rank <= 3) {
                    const rItem = document.createElement('div');
                    rItem.className = 'sidebar-item';
                    rItem.onclick = () => openReader(data.title, data.content, data.author);
                    rItem.innerHTML = `<strong style="color:var(--accent)">${rank}.</strong> ${data.title}`;
                    ranking.appendChild(rItem);
                    rank++;
                }
            });
        });

        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function openReader(t, c, a) {
            document.getElementById('view-title').innerText = t;
            document.getElementById('view-author').innerText = "จารึกโดย: " + a;
            document.getElementById('view-content').innerHTML = c;
            switchView('reader-view');
            localStorage.setItem('lastRead_v2', JSON.stringify({title: t, content: c, author: a}));
            checkReadingHistory();
        }

        function checkReadingHistory() {
            const history = JSON.parse(localStorage.getItem('lastRead_v2'));
            const bar = document.getElementById('reading-bar');
            if(history) {
                bar.style.display = 'flex';
                document.getElementById('reading-title').innerText = history.title;
            }
        }

        function resumeReading() {
            const h = JSON.parse(localStorage.getItem('lastRead_v2'));
            if(h) openReader(h.title, h.content, h.author);
        }

        function formatDoc(cmd, val=null) { document.execCommand(cmd, false, val); document.getElementById('post-editor').focus(); }
        function insertImage() { const url = prompt("ใส่ URL รูปภาพ:"); if(url) formatDoc('insertImage', url); }

        window.onload = checkReadingHistory;
    </script>
</body>
</html>
